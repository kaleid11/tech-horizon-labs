<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Tech Horizon Labs</title>
  <meta name="description" content="Get in touch with Tech Horizon Labs. Email, contact form, or book a call. Based in Noosa Heads, Queensland.">
  <link rel="canonical" href="https://techhorizonlabs.com/contact">
  <meta property="og:title" content="Contact — Tech Horizon Labs">
  <meta property="og:description" content="Get in touch. Based in Noosa Heads, Queensland.">
  <meta property="og:url" content="https://techhorizonlabs.com/contact">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="en_AU">
  <meta name="theme-color" content="#FAFAF8">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <canvas id="dot-grid" aria-hidden="true"></canvas>
  <a href="#main-content" class="skip-link">Skip to content</a>

  <nav class="site-nav" aria-label="Main navigation">
    <a href="/" class="brand">Tech Horizon Labs</a>
    <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
    </button>
    <ul class="nav-links">
      <li><a href="/work">Work</a></li>
      <li><a href="/about">About</a></li>
      <li><a href="/academy">Academy</a></li>
      <li><a href="/research">Research</a></li>
      <li><a href="/contact">Contact</a></li>
    </ul>
  </nav>

  <main id="main-content">
    <section class="hero container">
      <h1>Contact</h1>
      <p><a href="mailto:hello@techhorizonlabs.com">hello@techhorizonlabs.com</a></p>
      <p><small>Noosa Heads, QLD</small></p>
    </section>

    <section class="container fade-in">
      <form id="contact-form" novalidate>
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required autocomplete="name">
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" required></textarea>
        </div>
        <button type="submit" class="btn-submit">Send message</button>
        <div id="form-message"></div>
      </form>
    </section>

    <section class="section container fade-in">
      <p><small>If you'd prefer to talk, <a href="https://app.klipy.ai/book/pre-discovery/free-pre-discovery" target="_blank" rel="noopener" class="link-arrow">book a 15-minute call</a>.</small></p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-content">
      <div class="footer-left">
        <span class="footer-brand">Tech Horizon Labs</span>
        Noosa Heads, Queensland<br>
        ABN 80 976 285 425<br>
        hello@techhorizonlabs.com
      </div>
      <div class="footer-right">
        <a href="/privacy">Privacy</a>
        <a href="/terms">Terms</a>
      </div>
    </div>
  </footer>

  <script src="/main.js" defer></script>
</body>
</html>
