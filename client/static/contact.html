  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "How do I book a call?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "You can book a free 15-minute pre-discovery call at app.klipycrm.com/book/pre-discovery/free-pre-discovery. Or email hello@techhorizonlabs.com or call +61 478 919 419. We reply within one business day."
        }
      },
      {
        "@type": "Question",
        "name": "What is a pre-discovery call?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "A free 15-minute call where we understand your situation. No pitch. No obligation. We want to know what you're working with before we suggest anything. We turn away about 30% of inquiries because the timing or ROI doesn't make sense."
        }
      },
      {
        "@type": "Question",
        "name": "How long does a typical engagement run?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "The Horizon Method runs 8 to 14 weeks from initial mapping to deployed systems. Phase 1 (Map) is 1 to 2 weeks. Phase 2 (Blueprint) is 2 to 4 weeks. Phase 3 (Deploy) is 4 to 8 weeks. Ongoing retainer month-to-month after that."
        }
      },
      {
        "@type": "Question",
        "name": "What does it cost?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "We quote after the pre-discovery call, not before. Pricing depends on scope, team size, and what needs to be built. Academy membership starts at $97 per month for businesses building in-house AI capability."
        }
      }
    ]
  }
  </script>

    <section class="hero container">
      <h1>Contact</h1>
      <p><a href="mailto:hello@techhorizonlabs.com">hello@techhorizonlabs.com</a></p>
      <p><a href="tel:+61478919419">+61 478 919 419</a></p>

    </section>

    <section class="container fade-in">
      <form id="contact-form" novalidate>
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required autocomplete="name">
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" required></textarea>
        </div>
        <button type="submit" class="btn-submit">Send message</button>
        <div id="form-message"></div>
      </form>
    </section>

    <section class="section container fade-in">
      <p><small>If you'd prefer to talk, <a href="https://app.klipycrm.com/book/pre-discovery/free-pre-discovery" target="_blank" rel="noopener" class="link-arrow">book a 15-minute call</a>.</small></p>
    </section>
